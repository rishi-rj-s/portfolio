  <script>
    (function () {
      try {
        var d = document.documentElement;
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        if (theme !== 'light') d.classList.add('dark');
        if (['ocean','sunset','cyberpunk','forest'].includes(saved)) d.classList.add('theme-' + saved);
        var bgMap = {dark:'#000',ocean:'#0d1b32',sunset:'#2b0a0a',cyberpunk:'#09090b',forest:'#052e16',light:'#fff'};
        d.style.backgroundColor = bgMap[theme] || '#000';
      } catch (e) {}
    })();
  </script>

  <style>
    :root { 
      --l-accent: #6366f1; 
      --l-bg: #000;
      color-scheme: dark;
    }
    
    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--l-bg) !important;
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, monospace;
      overflow: hidden;
      perspective: 1200px;
    }

    #app-loader.fade-out {
      opacity: 0;
      transform: scale(1.1) translate3d(0, 0, 100px);
      transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
      pointer-events: none;
    }

    .loader-grid {
      position: absolute;
      inset: -100% -50%;
      background-image: 
        linear-gradient(rgba(99, 102, 241, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.1) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(circle at center, black, transparent 70%);
      transform: translate3d(0,0,-200px) rotateX(45deg);
      opacity: 0.2;
    }

    .loader-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      z-index: 10;
    }

    .l-optic {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .l-ring {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 50%;
    }

    .l-ring-active {
      position: absolute;
      inset: 15px;
      border: 2px solid var(--l-accent);
      border-radius: 50%;
      border-top-color: transparent;
      border-bottom-color: transparent;
      animation: l-spin 3s linear infinite;
    }

    .l-scan {
      position: absolute;
      width: 2px;
      height: 50%;
      top: 0;
      left: 50%;
      background: linear-gradient(to top, var(--l-accent), transparent);
      transform-origin: bottom center;
      animation: l-spin 6s linear infinite;
      margin-left: -1px;
    }

    .l-brand {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.6em;
      text-indent: 0.6em;
      text-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
      animation: l-pulse 2.5s ease-in-out infinite;
    }

    .l-bar-track {
      width: 240px;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .l-bar-fill {
      position: absolute;
      inset: 0;
      background: var(--l-accent);
      transform: translate3d(-100%, 0, 0);
      box-shadow: 0 0 15px var(--l-accent);
      animation: l-progress 1.8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
    }

    .l-status {
      font-size: 10px;
      letter-spacing: 0.4em;
      opacity: 0.6;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }

    .l-dot {
      width: 5px;
      height: 5px;
      background: var(--l-accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--l-accent);
      animation: l-blink 0.8s infinite alternate;
    }

    @keyframes l-spin { to { transform: rotate(360deg); } }
    @keyframes l-progress { 0% { transform: translate3d(-100%,0,0); } 50% { transform: translate3d(0,0,0); } 100% { transform: translate3d(100%,0,0); } }
    @keyframes l-pulse { 0%, 100% { opacity: 0.7; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }
    @keyframes l-blink { from { opacity: 1; } to { opacity: 0.3; } }

    html:not(.app-loaded), html:not(.app-loaded) body {
      overflow: hidden !important;
      height: 100vh !important;
    }
  </style>
